project_id: default

requires_pipelines:
  - stage-ts-ppt-day-mi-rollsum-3d.yml

vars:
  dataset_id: stage.prism_ppt_daily_mi_spi_3d_zscore_v1
  name: prism_stage_ts_ppt_day_mi_spi_3d
  state: MI
  prism_measure: ppt
  prism_period: daily
  input_filename_glob: "prism_ppt_us_30s_*.tif"

dirs:
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
  indir: "{env.basedir}/data/stage/prism/{prism_measure}/{prism_period}/{state}/rollsum3"
  outdir: "{env.basedir}/data/stage/prism/{prism_measure}/{prism_period}/{state}/spi3d"

steps:
  - name: "{sys.step.NN}_calc_spi_3d"
    plugin: geo/geo_raster_spi.py
    resources:
      mem: "16G"
    args:
      input_glob: "{dirs.indir}/*/{input_filename_glob}"
      output_dir: "{dirs.outdir}"
      method: zscore
      overwrite: false
    output_var: spi_3d
