project_id: land_core

vars:
  name: prism_stage_ts_ppt_day_state_child
  year: 2000
  state: MI
  prism_measure: ppt
  prism_period: daily
  prism_extract_dir: "{env.basedir}/data/prism/{prism_measure}/{prism_period}/raw/{year}"
  state_path: "{env.basedir}/data/tiger/state/extract/tl_2025_us_state.shp"

dirs:
  workdir: "{env.workdir}/{name}/{state}/{year}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
  outdir: "{env.basedir}/stage/prism/{prism_measure}/{prism_period}/state_tif/{state}/{year}"

steps:
  - name: "{sys.step.NN}_clip_state_rasters"
    plugin: geo/geo_clip_raster_by_polygon.py
    args:
      raster_path: "{item}"
      selector_path: "{state_path}"
      output_path: "{dirs.outdir}/{item_name}"
      key: STUSPS
      value: "{state}"
      overwrite: false
    foreach_glob: "{prism_extract_dir}/**/*.tif"
    foreach_kind: files
    output_var: clipped_state_raster
