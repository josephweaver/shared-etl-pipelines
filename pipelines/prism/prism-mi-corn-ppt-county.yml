project_id: default

requires_pipelines:
  - ../cdl/download-national-30m-2008-2025.yml
  - ../tiger/state.yml
  - ../tiger/county.yml
  - ../prism/stage-ts-ppt-day-state.yml

vars:
  dataset_id: stage.mi_corn_prism_ppt_county_v1
  name: mi_corn_prism_ppt_county
  state: MI
  statefp: "26"
  years: "{expr.range(2008, 2018)}"
  cdl_extract_dir: "{env.basedir}/data/cdl/national_30m/extract"
  state_path: "{env.basedir}/data/tiger/state/extract/tl_2025_us_state.shp"
  county_path: "{env.basedir}/data/tiger/county/extract/tl_2025_us_county.shp"
  prism_mi_dir: "{env.basedir}/data/stage/prism/ppt/daily/{state}/mask"

dirs:
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
  cdl_mi_dir: "{env.basedir}/data/stage/cdl/{state}/state"
  mask30_dir: "{env.basedir}/data/stage/cdl/{state}/binary_masks_30m"
  fraction_dir: "{env.basedir}/data/stage/cdl/{state}/prism_fraction"
  weighted_dir: "{env.basedir}/data/stage/prism/ppt/daily/{state}/crop_weighted"
  county_dir: "{env.basedir}/data/stage/prism/ppt/daily/{state}/county_crop_weighted"

steps:
  - name: "{sys.step.NN}_clip_mi_cdl"
    plugin: geo/geo_clip_raster_by_polygon.py
    args:
      raster_path: "{cdl_extract_dir}/{item}/{item}_30m_cdls.tif"
      output_path: "{dirs.cdl_mi_dir}/{item}/mi_{item}_cdl.tif"
      selector_path: "{state_path}"
      key: STUSPS
      value: "{state}"
      overwrite: false
    foreach: years
    output_var: cdl_mi
  - name: "{sys.step.NN}_mask_mi_corn_30m"
    plugin: geo/geo_raster_value_mask.py
    args:
      input_raster: "{dirs.cdl_mi_dir}/{item}/mi_{item}_cdl.tif"
      output_path: "{dirs.mask30_dir}/{item}/corn_30m.tif"
      include_values: "1"
      overwrite: false
    foreach: years
    output_var: corn_mask30
  - name: "{sys.step.NN}_resample_corn_fraction_to_prism"
    plugin: geo/geo_raster_reproject.py
    args:
      input_path: "{dirs.mask30_dir}/{item}/corn_30m.tif"
      output_path: "{dirs.fraction_dir}/{item}/corn_fraction.tif"
      template_glob: "{prism_mi_dir}/{item}/*.tif"
      resampling: average
      dst_nodata: 255
      overwrite: false
    foreach: years
    output_var: corn_fraction
  - name: "{sys.step.NN}_weight_mi_prism_ppt_for_corn"
    plugin: geo/geo_raster_multiply.py
    args:
      input_dir: "{prism_mi_dir}/{item}"
      filename_glob: "*.tif"
      weight_raster: "{dirs.fraction_dir}/{item}/corn_fraction.tif"
      output_dir: "{dirs.weighted_dir}/corn/{item}"
      overwrite: false
    foreach: years
    output_var: corn_weighted
  - name: "{sys.step.NN}_aggregate_corn_by_county"
    plugin: geo/geo_county_weighted_raster_aggregate.py
    args:
      input_dir: "{dirs.weighted_dir}/corn/{item}"
      filename_glob: "*.tif"
      weight_raster: "{dirs.fraction_dir}/{item}/corn_fraction.tif"
      county_path: "{county_path}"
      output_path: "{dirs.county_dir}/corn/county_corn_ppt_{item}.csv"
      county_id_field: GEOID
      county_name_field: NAME
      value_prefix: corn_ppt
      day_from_filename_regex: "(\\d{8})"
      overwrite: true
    foreach: years
    output_var: corn_county
