project_id: default

requires_pipelines:
  - download-ts-ppt-day.yml
  - ../tiger/state.yml

vars:
  name: prism_stage_ts_ppt_day_state
  years: "{expr.range(2000, 2018)}"
  state_year_pairs: "{expr.product(years, project.states_of_interest)}"

dirs:
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"

steps:
  - name: "{sys.step.NN}_run_state_year_child"
    plugin: pipeline_execute.py
    args:
      pipeline_path: "pipelines/prism/stage-ts-ppt-day-state-child.yml"
      mode: synchronized
      vars_kv: "year={item.0};state={item.1}"
    foreach: state_year_pairs
    parallel_with: state_year_children
    output_var: state_year_child
