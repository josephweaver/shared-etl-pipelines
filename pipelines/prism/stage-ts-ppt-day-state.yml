project_id: default

requires_pipelines:
  - download-ts-ppt-day.yml
  - ../tiger/state.yml

vars:
  name: prism_stage_ts_ppt_day_state
  state: MI
  years: "{expr.range(2000, 2018)}"

dirs:
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"

steps:
  - name: "{sys.step.NN}_run_mi_year_child"
    plugin: pipeline_execute.py
    args:
      pipeline_path: "pipelines/prism/stage-ts-ppt-day-state-child.yml"
      mode: synchronized
      env: hpcc_msu_local
      vars_kv: "year={item};state={state}"
    foreach: years
    parallel_with: year_children
    output_var: state_year_child
